apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
  name: job-orchestrator-scaled
  namespace: keda-rpa
spec:
  jobTargetRef:
    parallelism: 1
    completions: 1
    backoffLimit: 4
    template:
      metadata:
        labels:
          app: job-orchestrator
      spec:
        restartPolicy: OnFailure
        containers:
        - name: job-orchestrator
          image: rpa_kind_playwright/job-orchestrator:1.0
          volumeMounts:
          - name: localtime
            mountPath: /etc/localtime
        volumes:
        - name: localtime
          hostPath:
            path: /usr/share/zoneinfo/Asia/Shanghai
  pollingInterval: 5
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  maxReplicaCount: 10
  triggers:
  - type: redis
    metadata:
      address: redis-server.redis-server.svc.cluster.local:6379
      listName: task_queue
      listLength: "1"
    authenticationRef:
      name: redis-trigger-auth
