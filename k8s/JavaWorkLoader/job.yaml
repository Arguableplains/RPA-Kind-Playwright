apiVersion: batch/v1
kind: Job
metadata:
  generateName: jar-runner-job-
  namespace: java-work-loader
  labels:
    app: jar-runner
    type: template
spec:
  ttlSecondsAfterFinished: 60
  template:
    metadata:
      labels:
        app: jar-runner
    spec:
      restartPolicy: Never
      containers:
        - name: jar-runner
          image: rpa_kind_playwright/redis-task-publisher:1.0